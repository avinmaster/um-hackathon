services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opus
      POSTGRES_PASSWORD: opus
      POSTGRES_DB: opus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opus -d opus"]
      interval: 3s
      retries: 10

volumes:
  pgdata:
